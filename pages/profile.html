<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Profile</title>

    <link rel="stylesheet" href="../css/profile.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="profile-container">

        <!-- Header -->

        <div class="header">

            <i class="fa-solid fa-arrow-left" id="backBtn"></i>

            <h2>Admin Profile</h2>

        </div>

        <!-- Profile Card -->

        <div class="profile-card">

            <img src="../assets/admin.png" alt="Admin">

            <h2>Admin</h2>

            <p>Administrator</p>

        </div>

        <!-- Profile Details -->

        <div class="details">

            <div class="input-group">

                <label>Admin Name</label>

                <input type="text"
                    id="adminName"
                    value="Admin"
                    disabled>

            </div>

            <div class="input-group">

                <label>Mobile Number</label>

                <input type="text"
                    id="mobile"
                    value="9876543210"
                    disabled>

            </div>

            <div class="input-group">

                <label>Email</label>

                <input type="email"
                    id="email"
                    value="admin@soundpro.com"
                    disabled>

            </div>

            <div class="input-group">

                <label>Role</label>

                <input type="text"
                    id="role"
                    value="Administrator"
                    disabled>

            </div>

            <div class="input-group">

                <label>Company</label>

                <input type="text"
                    id="company"
                    value="SoundPro Pvt. Ltd."
                    disabled>

            </div>

            <div class="input-group">

                <label>Address</label>

                <textarea
                    id="address"
                    rows="3"
                    disabled>Nagpur, Maharashtra, India</textarea>

            </div>

        </div>

        <!-- Buttons -->

        <div class="button-group">

            <button id="editBtn" class="edit-btn">

                <i class="fa-solid fa-pen"></i>

                Edit Profile

            </button>

            <button id="saveBtn" class="save-btn">

                <i class="fa-solid fa-floppy-disk"></i>

                Save

            </button>

            <button id="cancelBtn" class="cancel-btn">

                <i class="fa-solid fa-xmark"></i>

                Cancel

            </button>

        </div>

    </div>

    <script src="../js/profile.js"></script>

</body>

</html>
