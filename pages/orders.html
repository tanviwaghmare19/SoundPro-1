<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/orders.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar" id="sidebar">

        <div class="sidebar-header">

            <i class="fa-solid fa-arrow-left close-sidebar" id="closeSidebar"></i>

            <h2>SOUND<span>PRO</span></h2>

        </div>

        <div class="admin">

    <img src="../assets/admin.png" class="admin-img" id="adminImage" alt="Admin">

    <span id="adminNameSidebar">Admin</span>

</div>


        <ul>

            <li onclick="location.href='dashboard.html'">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </li>

            <li onclick="location.href='products.html'">

                <i class="fa-solid fa-box"></i>

                Products

            </li>

            <li onclick="location.href='addProduct.html'">

                <i class="fa-solid fa-plus"></i>

                Add Product

            </li>

            <li class="active" onclick="location.href='orders.html'">

                <i class="fa-solid fa-cart-shopping"></i>

                Orders

            </li>

            <li onclick="location.href='reports.html'">

                <i class="fa-solid fa-file-lines"></i>

                Reports

            </li>

            <li onclick="location.href='salesReport.html'">

                <i class="fa-solid fa-chart-line"></i>

                Sales Report

            </li>

            <li onclick="location.href='createBill.html'">

                <i class="fa-solid fa-file-invoice"></i>

                Billing

            </li>

            <li onclick="location.href='#'">

                <i class="fa-solid fa-money-bill-transfer"></i>

                Return & Refunds
            </li>

            <li onclick="location.href='lowStock.html'">

                <i class="fa-solid fa-triangle-exclamation"></i>

                Low Stock

            </li>

            <li onclick="location.href='profile.html'">

                <i class="fa-solid fa-user"></i>

                Profile
            </li>

           <li onclick="location.href='settings.html'">
            <i class="fa-solid fa-gear"></i>
            Settings
            </li>

        </ul>

        <hr class="sidebar-line">

        <div class="logout" onclick="logout()">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </div>

    </div>

    <!-- ================= MAIN CONTAINER ================= -->

    <div class="container">

        <!-- Header -->

        <div class="header">

           <div class="left">

    <button class="back-btn"
            onclick="window.location.href='dashboard.html'">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <h2>Orders</h2>

</div>

            <div class="right">

                <input
                    type="text"
                    id="search"
                    placeholder="Search Order / Customer">

            </div>

        </div>

        <!-- Filter Buttons -->

        <div class="filters">

            <button class="active filter-btn" data-status="All">
                All
            </button>

            <button class="filter-btn" data-status="Pending">
                Pending
            </button>

            <button class="filter-btn" data-status="Processing">
                Processing
            </button>

            <button class="filter-btn" data-status="Delivered">
                Delivered
            </button>

            <button class="filter-btn" data-status="Cancelled">
                Cancelled
            </button>

        </div>

        <!-- Orders -->

        <div id="ordersContainer"></div>

    </div>

    <!-- ================= ORDER DETAILS MODAL ================= -->

    <div class="modal" id="orderModal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <div id="modalBody"></div>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="../js/orders.js"></script>

</body>

</html>
