<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/orders.css">
    <link rel="stylesheet" href="/components/sidebar.css">
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <!-- ================= SIDEBAR ================= -->



    <!-- ================= MAIN CONTAINER ================= -->

    <div class="container">

        <!-- Header -->

        <div class="header">

            <div class="left">

                <i class="fa-solid fa-bars" onclick="toggleSidebar()"></i>

                <h2>Orders</h2>

            </div>

            <div class="right">

                <input
                    type="text"
                    id="search"
                    placeholder="Search Order / Customer">

            </div>

        </div>

        <!-- Filter Buttons -->

        <div class="filters">

            <button class="active filter-btn" data-status="All">
                All
            </button>

            <button class="filter-btn" data-status="Pending">
                Pending
            </button>

            <button class="filter-btn" data-status="Processing">
                Processing
            </button>

            <button class="filter-btn" data-status="Delivered">
                Delivered
            </button>

            <button class="filter-btn" data-status="Cancelled">
                Cancelled
            </button>

        </div>

        <!-- Orders -->

        <div id="ordersContainer"></div>

    </div>

    <!-- ================= ORDER DETAILS MODAL ================= -->

    <div class="modal" id="orderModal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <div id="modalBody"></div>

        </div>

    </div>

    <!-- JavaScript -->

    <script src="../js/orders.js"></script>
<script src="/components/sidebar.js"></script>

</body>

</html>
