<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <link rel="stylesheet" href="../css/changePassword.css">
    <link rel="stylesheet" href="/components/sidebar.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <div class="change-password-container">

        <!-- Header -->

        <div class="header">

            <i class="fa-solid fa-arrow-left" id="backBtn"></i>

            <h2>Change Password</h2>

        </div>

        <!-- Card -->

        <div class="password-card">

            <!-- Current Password -->

            <div class="input-group">

                <label>Current Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="currentPassword"
                        placeholder="Enter Current Password">

                    <i class="fa-solid fa-eye togglePassword"></i>

                </div>

            </div>

            <!-- New Password -->

            <div class="input-group">

                <label>New Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="newPassword"
                        placeholder="Enter New Password">

                    <i class="fa-solid fa-eye togglePassword"></i>

                </div>

            </div>

            <!-- Confirm Password -->

            <div class="input-group">

                <label>Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm Password">

                    <i class="fa-solid fa-eye togglePassword"></i>

                </div>

            </div>

            <!-- Password Strength -->

            <div class="strength">

                <span>Password Strength :</span>

                <span id="strengthText">Weak</span>

            </div>

            <!-- Rules -->

            <div class="rules">

                <p id="lengthRule">❌ Minimum 8 Characters</p>

                <p id="upperRule">❌ One Uppercase Letter</p>

                <p id="lowerRule">❌ One Lowercase Letter</p>

                <p id="numberRule">❌ One Number</p>

                <p id="specialRule">❌ One Special Character</p>

            </div>

            <!-- Button -->

            <button id="changeBtn">

                <i class="fa-solid fa-key"></i>

                Change Password

            </button>

        </div>

    </div>

    <script src="../js/changePassword.js"></script>
<script src="/components/sidebar.js"></script>

</body>

</html>
