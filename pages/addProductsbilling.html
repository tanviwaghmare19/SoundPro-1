<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/addProductsbilling.css">
    <link rel="stylesheet" href="/components/sidebar.css">
</head>
<body>
    <header class="header">
        <button class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="menu-btn" style="display:none"></div>
        <h2>Add Products</h2>
    </header>

    <section class="customer">
        <div class="customer-left">
            <div id="customerAvatar" class="avatar purple">
                <i class="fas fa-user"></i>
            </div>
            <div class="customer-info">
                <div class="customer-line">
                    <strong id="customerName">Rahul Sharma</strong>
                    <span id="customerMobile"><i class="fa fa-phone"></i> 9876543210</span>
                    <span id="customerCity"><i class="fa fa-location-dot"></i> Ahmedabad</span>
                </div>
                <div class="gst-options">
                    <label>
                        <input type="radio" name="gstType" value="No GST" checked>
                        No GST
                    </label>
                    <label>
                        <input type="radio" name="gstType" value="CGST+SGST">
                        CGST+SGST
                    </label>
                    <label>
                        <input type="radio" name="gstType" value="IGST">
                        IGST
                    </label>
                    <label>
                        <input type="radio" name="gstType" value="CGST+SGST+IGST">
                        CGST+SGST+IGST
                    </label>
                </div>
                <div class="calc-mode-options" style="margin-top:8px;font-size:13px;">
                    <label style="font-weight:600;margin-right:8px;">Calc Mode:</label>
                    <label><input type="radio" name="calcMode" value="simple" checked> Simple</label>
                    <label><input type="radio" name="calcMode" value="calculated"> Calculated</label>
                </div>
            </div>
        </div>
    </section>

    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search Product">
    </div>

    <div id="searchResults" class="search-results"></div>

    <div id="productList" class="product-list">
        <table class="product-table" id="productTable">
            <thead>
                <tr id="tableHeaderRow">
                    <th>Sr No</th>
                    <th>Product Name</th>
                    <th>Rate</th>
                    <th>Qty</th>
                    <th>Amount</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="productTableBody"></tbody>
        </table>
    </div>

    <div class="bill-summary">
        <div class="summary-row">
            <span>Subtotal</span>
            <span id="grandTotal">₹0.00</span>
        </div>
        <div id="dynamicSummaryRows"></div>
        <div class="summary-row final-total">
            <span>Net Total</span>
            <span id="netTotal">₹0.00</span>
        </div>

        <button id="generateBtn">Generate Bill</button>
    </div>

    <script src="../js/addProductsbilling.js"></script>
    <script src="/components/sidebar.js"></script>
</body>
</html>
