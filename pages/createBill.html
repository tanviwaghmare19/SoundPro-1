<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Bill</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="../css/createBill.css">
    <link rel="stylesheet" href="../components/sidebar.css">
</head>


<body>

<div class="app">

    <!-- HEADER -->
    <header class="navbar">

        <button class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

    <h1>Create Bill</h1>

    </header>

    <!-- SEARCH -->
    <section class="search-section">


        <div class="search-box">


            <i class="fas fa-search"></i>


            <input
                type="text"
                id="searchInput"
                placeholder="Search by Name / Mobile / Code">


        </div>


    </section>

    <!-- CUSTOMER LIST -->
    <div id="customerList"></div>

    <!-- BOTTOM BUTTON -->
    <div class="bottom-bar">


        <button id="addCustomerBtn">


            <i class="fas fa-plus"></i>


            Add New Customer

        </button>

    </div>

    <!-- Add Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Add New Customer</h2>
            <form id="customerForm">
                <input type="text" id="customerName" placeholder="Customer Name" required>
                <input type="tel" id="customerMobile" placeholder="Contact Number" required>
                <input type="text" id="customerAddress" placeholder="Address (optional)">
                <input type="text" id="customerCompany" placeholder="Company Name (optional)">
                <button type="submit" id="saveCustomerBtn">Save Customer</button>
            </form>
        </div>
    </div>

</div>

<script src="../js/createBill.js"></script>
<script src="../components/sidebar.js"></script>
</body>
</html>
