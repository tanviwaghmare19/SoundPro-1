<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/products.css">
    <link rel="stylesheet" href="/components/sidebar.css">
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= SIDEBAR ================= -->



    <!-- ================= MAIN ================= -->

    <div class="main-container">

        <!-- Header -->

        <div class="header">

            <div class="menu" onclick="toggleSidebar()">

                <i class="fa-solid fa-bars"></i>

            </div>

            <div class="title">

                Products

            </div>

            <div class="notification">

                <i class="fa-solid fa-bell"></i>

            </div>

        </div>

        <!-- Search -->

        <div class="search-section">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search Products">

            </div>

            <div class="filter-icon" id="filterBtn">

                <i class="fa-solid fa-filter"></i>

            </div>

        </div>

        <!-- Filter Panel -->

        <div class="filter-panel" id="filterPanel">

            <div class="filter-header">

                <h2>Filters</h2>

                <i class="fa-solid fa-xmark" id="closeFilter"></i>

            </div>

            <!-- Category -->

            <div class="filter-section">

                <h3>Category</h3>

                <label><input type="checkbox" class="categoryFilter" value="Speaker"> Speaker</label>

                <label><input type="checkbox" class="categoryFilter" value="Mixer"> Mixer</label>

                <label><input type="checkbox" class="categoryFilter" value="Microphone"> Microphone</label>

                <label><input type="checkbox" class="categoryFilter" value="Amplifier"> Amplifier</label>

                <label><input type="checkbox" class="categoryFilter" value="Cable"> Cable</label>

                <label><input type="checkbox" class="categoryFilter" value="Headphone"> Headphone</label>

            </div>

            <!-- Brand -->

            <div class="filter-section">

                <h3>Brand</h3>

                <label><input type="checkbox" class="brandFilter" value="JBL"> JBL</label>

                <label><input type="checkbox" class="brandFilter" value="Yamaha"> Yamaha</label>

                <label><input type="checkbox" class="brandFilter" value="Sony"> Sony</label>

                <label><input type="checkbox" class="brandFilter" value="Shure"> Shure</label>

                <label><input type="checkbox" class="brandFilter" value="Behringer"> Behringer</label>

            </div>

            <!-- Price -->

            <div class="filter-section">

                <h3>Price</h3>

                <label><input type="checkbox" class="priceFilter" value="1"> ₹0 - ₹5,000</label>

                <label><input type="checkbox" class="priceFilter" value="2"> ₹5,001 - ₹20,000</label>

                <label><input type="checkbox" class="priceFilter" value="3"> ₹20,001 - ₹50,000</label>

                <label><input type="checkbox" class="priceFilter" value="4"> Above ₹50,000</label>

            </div>

            <!-- Stock -->

            <div class="filter-section">

                <h3>Stock Status</h3>

                <label><input type="checkbox" class="stockFilter" value="instock"> In Stock</label>

                <label><input type="checkbox" class="stockFilter" value="low"> Low Stock</label>

                <label><input type="checkbox" class="stockFilter" value="out"> Out Of Stock</label>

            </div>

            <!-- Sort -->

            <div class="filter-section">

                <h3>Sort By</h3>

                <label><input type="radio" name="sort" value="nameAZ"> Product Name A-Z</label>

                <label><input type="radio" name="sort" value="nameZA"> Product Name Z-A</label>

                <label><input type="radio" name="sort" value="priceLow"> Price Low-High</label>

                <label><input type="radio" name="sort" value="priceHigh"> Price High-Low</label>

            </div>

            <div class="filter-buttons">

                <button id="applyFilter">

                    Apply Filter

                </button>

                <button id="resetFilter">

                    Reset

                </button>

            </div>

        </div>

        <!-- Product List -->

        <div id="productContainer">

        </div>

        <!-- Floating Button -->

        <button class="floating-btn">

            <i class="fa-solid fa-plus"></i>

        </button>

    </div>

    <!-- JS -->

    <script src="../js/products.js"></script>
<script src="/components/sidebar.js"></script>

</body>

</html>
