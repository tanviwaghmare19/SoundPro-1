<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../js/auth.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AudioTonic Dashboard</title>

    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../components/sidebar.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>


    <!-- Header -->
    <header class="header">

        <div class="menu-title">

            <i class="fa-solid fa-bars"
               onclick="toggleSidebar()"></i>

            <h2>Dashboard</h2>

        </div>

    </header>

    <!-- Dashboard Cards -->
    <section class="cards">

        <div class="card purple"
             onclick="location.href='products.html'">

            <div class="card-content">
                <h3>Total Products</h3>
                <p>120</p>
            </div>

            <div class="card-footer">
                <span>View All</span>
                <span>&gt;</span>
            </div>

        </div>

        <div class="card green"
             onclick="location.href='lowStock.html'">

            <div class="card-content">
                <h3>Low Stock Items</h3>
                <p>15</p>
            </div>

            <div class="card-footer">
                <span>View All</span>
                <span>&gt;</span>
            </div>

        </div>

       <div class="card blue"
     onclick="location.href='orders.html'">

    <div class="card-content">
        <h3>Total Orders</h3>
        <p>250</p>
    </div>

    <div class="card-footer">
        <span>View All</span>
        <span>&gt;</span>
    </div>

</div>

<div class="card orange">

    <div class="card-content">
        <h3>Total Revenue</h3>
        <p>₹4,50,000</p>
    </div>

    <div class="card-footer">
        <span>View Revenue</span>
        <span>&gt;</span>
    </div>

</div>

</section>

<section class="chart-container">

    <div class="section">

        <h2>Total Revenue</h2>

        <div class="graph">

            <svg viewBox="0 0 600 300">

                <polyline
                    fill="none"
                    stroke="#4a77f0"
                    stroke-width="4"
                    points="50,250 150,180 250,170 350,90 450,70 550,40" />

            </svg>

        </div>

    </div>

    <div class="section">

        <h2>Stock Overview</h2>

        <div class="stock-box">

            <div class="pie-chart"></div>

            <div class="legend">

                <p>
                    <span class="dot green-dot"></span>
                    In Stock
                </p>

                <p>
                    <span class="dot orange-dot"></span>
                    Low Stock
                </p>

                <p>
                    <span class="dot red-dot"></span>
                    Out Of Stock
                </p>

            </div>

        </div>

    </div>

</section>

<script src="../js/dashboard.js"></script>
<script src="../components/sidebar.js"></script>

</body>

</html>
