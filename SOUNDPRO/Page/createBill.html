<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Bill</title>

   

    <link rel="stylesheet" href="../CSS/createBill.css">
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="navbar">
        <button class="menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <h1>Create Bill</h1>

    </header>

<div class="app"></div>

    <!-- Search -->
    <section class="search-section">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input
                type="text"
                id="searchInput"
                placeholder="Search by Name / Mobile / Code">
        </div>
    </section>

    <!-- Customer List -->
    <main class="content">

        <h3>Recent Customers</h3>

        <div id="customerList">

            <div class="customer-card"
                 data-name="Rahul Sharma"
                 data-mobile="9876543210"
                 data-city="Ahmedabad"
                data-code="CUST001"
                data-color="purple">

    <div class="customer-left">

        <div class="avatar purple">
            <i class="fas fa-user"></i>
        </div>

        <div class="details">
            <h4>Rahul Sharma</h4>
            <p>9876543210</p>
            <span>CUST001</span>
        </div>

    </div>

    <i class="fas fa-chevron-right"></i>

</div>

            <div class="customer-card"
                 data-name="Amit Verma"
                 data-mobile="9876543211"
                 data-code="CUST002"
                 data-color="green"
                 data-city="Surat">

                <div class="customer-left">
                    <div class="avatar green">
                        <i class="fas fa-user"></i>
                    </div>

                    <div class="details">
                        <h4>Amit Verma</h4>
                        <p>9876543211</p>
                        <span>CUST002</span>
                    </div>
                </div>

                <i class="fas fa-chevron-right"></i>

            </div>

            <div class="customer-card"
                 data-name="Priya Patel"
                 data-mobile="9876543212"
                 data-code="CUST003"
                 data-color="yellow"
data-city="Vadodara">

                <div class="customer-left">
                    <div class="avatar yellow">
                        <i class="fas fa-user"></i>
                    </div>

                    <div class="details">
                        <h4>Priya Patel</h4>
                        <p>9876543212</p>
                        <span>CUST003</span>
                    </div>
                </div>

                <i class="fas fa-chevron-right"></i>

            </div>

            <div class="customer-card"
                 data-name="Neha Singh"
                 data-mobile="9876543213"
                 data-code="CUST004"
                 data-city="Rajkot"
     data-color="red" >

                <div class="customer-left">
                    <div class="avatar red">
                        <i class="fas fa-user"></i>
                    </div>

                    <div class="details">
                        <h4>Neha Singh</h4>
                        <p>9876543213</p>
                        <span>CUST004</span>
                    </div>
                </div>

                <i class="fas fa-chevron-right"></i>

            </div>

        </div>

    </main>

    <!-- Bottom Button -->
    <div class="bottom-bar">
        <button id="addCustomerBtn">
            <i class="fas fa-plus"></i>
            Add New Customer
        </button>
    </div>

</div>

<script src="../JS/createBill.js"></script>
</body>
</html>
