<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SoundPro Login</title>

    <link rel="stylesheet"
          href="LoginPage.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Theme Toggle -->

    <button id="themeToggle"
            class="theme-toggle">

        <i class="fas fa-moon"></i>

    </button>

    <!-- Login Container -->

    <div class="login-container">

        <div class="logo">

            <div class="logo-circle">
                SP
            </div>

            <h1>
                SOUND
                <span>PRO</span>
            </h1>

        </div>

        <h2>Welcome Back!</h2>

        <div class="input-box">

            <i class="fa-solid fa-envelope"></i>

            <input type="email"
                   id="email"
                   placeholder="Email">

        </div>

        <div class="input-box">

            <i class="fa-solid fa-lock"></i>

            <input type="password"
                   id="password"
                   placeholder="Password">

        </div>

        <button class="login-btn"
                onclick="login()">

            LOGIN

        </button>

    </div>

    <script src="LoginPage.js"></script>

</body>

</html>
